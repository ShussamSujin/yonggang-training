<script>
// === SEED DATA ===
const seedOrders = [

  { id: 'seed-003', customer: '박민준', phone: '010-5555-6666', address: '서울시 마포구 홍익로 88', orderType: 'delivery', items: [{ name: '양념 치킨', qty: 1, price: 29000 }], total: 29000, timeSlot: '40-50분', note: '리뷰 이벤트 참여합니다!', status: 'new', timestamp: Date.now() - 300000, timeLabel: '5분 전' },
  { id: 'seed-004', customer: '최지수', phone: '010-7777-8888', address: '포장', orderType: 'pickup', items: [{ name: '프라이드 치킨', qty: 2, price: 52000 }], total: 52000, timeSlot: '30-40분', note: '', status: 'cooking', timestamp: Date.now() - 480000, timeLabel: '8분 전' },
  { id: 'seed-005', customer: '정우성', phone: '010-1111-2222', address: '서울시 용산구 이태원로 5', orderType: 'delivery', items: [{ name: '양념 치킨', qty: 1, price: 29000 }], total: 29000, timeSlot: '40-50분', note: '양파 빼주세요.', status: 'cooking', timestamp: Date.now() - 720000, timeLabel: '12분 전' },
  { id: 'seed-006', customer: '한소희', phone: '010-3333-4444', address: '서울시 성동구 왕십리로 30', orderType: 'delivery', items: [{ name: '반반 치킨', qty: 1, price: 28000 }], total: 28000, timeSlot: '30-40분', note: '', status: 'delivery', timestamp: Date.now() - 1200000, timeLabel: '20분 전' },
  { id: 'seed-007', customer: '이준호', phone: '010-6666-7777', address: '서울시 서초구 서초대로 100', orderType: 'delivery', items: [{ name: '프라이드 치킨', qty: 1, price: 26000 }], total: 26000, timeSlot: '20-30분', note: '', status: 'delivery', timestamp: Date.now() - 1500000, timeLabel: '25분 전' },
  { id: 'seed-008', customer: '박서준', phone: '010-2222-3333', address: '포장', orderType: 'pickup', items: [{ name: '반반 치킨', qty: 1, price: 28000 }], total: 28000, timeSlot: '20-30분', note: '', status: 'completed', timestamp: Date.now() - 3600000, timeLabel: '1시간 전' },
  { id: 'seed-009', customer: '김민지', phone: '010-4444-5555', address: '서울시 종로구 인사동길 12', orderType: 'delivery', items: [{ name: '프라이드 치킨', qty: 1, price: 26000 }, { name: '양념 치킨', qty: 1, price: 29000 }], total: 55000, timeSlot: '40-50분', note: '인터폰 안되니 전화주세요.', status: 'completed', timestamp: Date.now() - 7200000, timeLabel: '2시간 전' },
];

function getOrders() {
  const stored = localStorage.getItem('jw_orders');
  if (!stored) {
    localStorage.setItem('jw_orders', JSON.stringify(seedOrders));
    return [...seedOrders];
  }
  const orders = JSON.parse(stored);
  // Inject seeds if not present
  const hasSeed = orders.some(o => o.id && o.id.startsWith('seed-'));
  if (!hasSeed) {
    const merged = [...orders, ...seedOrders];
    localStorage.setItem('jw_orders', JSON.stringify(merged));
    return merged;
  }
  return orders;
}

function saveOrders(orders) {
  localStorage.setItem('jw_orders', JSON.stringify(orders));
}

let currentTab = 'new';

// === TABS ===
function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  renderOrderCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTabs() {
  const orders = getOrders();
  const tabDefs = [
    { id: 'new', label: '신규 주문' },
    { id: 'cooking', label: '조리 중' },
    { id: 'delivery', label: '배달 중' },
    { id: 'completed', label: '완료' },
  ];

  tabDefs.forEach(({ id }) => {
    const btn = document.getElementById(`tab-${id}`);
    const badge = document.getElementById(`badge-${id}`);
    const count = orders.filter(o => o.status === id).length;
    if (badge) badge.textContent = count;

    if (id === currentTab) {
      btn.className = 'flex-none px-6 py-3 bg-primary text-white rounded-full font-bold shadow-lg shadow-primary/20 flex items-center gap-2';
      badge.className = 'bg-white text-primary px-2 py-0.5 rounded-full text-xs';
    } else {
      btn.className = 'flex-none px-6 py-3 bg-surface-container-high text-on-surface-variant rounded-full font-bold hover:bg-surface-container-highest transition-colors flex items-center gap-2';
      badge.className = 'bg-on-surface-variant/20 px-2 py-0.5 rounded-full text-xs';
    }
  });
}

// === ORDER CARDS ===
function renderOrderCards() {
  const orders = getOrders();
  const filtered = orders.filter(o => o.status === currentTab);
  const container = document.getElementById('orders-container');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="col-span-3 flex flex-col items-center justify-center py-20 text-on-surface-variant">
        <span class="material-symbols-outlined text-7xl opacity-20 mb-4">inbox</span>
        <p class="font-bold text-lg">주문이 없습니다</p>
        <p class="text-sm mt-1 opacity-60">새 주문이 들어오면 여기에 표시됩니다</p>
      </div>`;
    return;
  }

  const borderColors = { new: 'border-primary', cooking: 'border-amber-400', delivery: 'border-tertiary', completed: 'border-outline' };

  container.innerHTML = filtered.map(order => {
    const itemSummary = order.items.map(i => `${i.name} ${i.qty}개`).join(', ');
    const borderColor = borderColors[order.status] || 'border-outline';
    const actions = getActionButtons(order);
    const typeTag = order.orderType === 'delivery'
      ? `<span class="text-[10px] px-2 py-0.5 rounded-md font-bold bg-tertiary-container text-on-tertiary-container">배달</span>`
      : `<span class="text-[10px] px-2 py-0.5 rounded-md font-bold bg-primary-container text-on-primary-container">포장</span>`;

    return `
      <div id="card-${order.id}" class="bg-surface-container-lowest p-6 rounded-xl border-l-8 ${borderColor} shadow-sm hover:shadow-md transition-all duration-200">
        <div class="flex justify-between items-start mb-4">
          <div>
            <span class="text-xs font-bold text-primary mb-1 block">#${order.id.slice(-8).toUpperCase()}</span>
            <h3 class="text-xl font-extrabold">${order.customer} 고객님</h3>
          </div>
          <div class="flex flex-col items-end gap-1">
            <span class="bg-surface-container-high text-on-surface-variant text-[10px] px-2 py-1 rounded-md font-bold">${order.timeLabel}</span>
            ${typeTag}
          </div>
        </div>
        <div class="space-y-2 mb-5">
          <div class="flex justify-between text-sm">
            <span class="text-on-surface-variant">${itemSummary}</span>
            <span class="font-bold">${order.total.toLocaleString()}원</span>
          </div>
          ${order.note ? `<p class="text-xs text-on-surface-variant/60 leading-relaxed italic">"${order.note}"</p>` : '<p class="text-xs text-on-surface-variant/40">요청사항 없음</p>'}
          ${order.orderType === 'delivery' && order.address !== '포장' ? `<p class="text-xs text-on-surface-variant font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-xs">location_on</span>${order.address}</p>` : ''}
          <p class="text-xs text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-xs">phone</span>${order.phone}</p>
        </div>
        ${actions}
      </div>`;
  }).join('');
}

function getActionButtons(order) {
  if (order.status === 'new') {
    return `
      <div class="grid grid-cols-2 gap-3">
        <button onclick="rejectOrder('${order.id}')" class="py-3 bg-surface-container-high text-on-surface font-bold rounded-xl active:scale-95 transition-transform hover:bg-error-container">거절</button>
        <button onclick="acceptOrder('${order.id}')" class="py-3 bg-primary text-white font-bold rounded-xl active:scale-95 transition-transform hover:opacity-90">주문 접수</button>
      </div>`;
  }
  if (order.status === 'cooking') {
    return `
      <button onclick="advanceOrder('${order.id}', 'delivery')" class="w-full py-3 bg-amber-500 text-white font-bold rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2 hover:opacity-90">
        <span class="material-symbols-outlined text-base">local_shipping</span>
        조리 완료 → 배달 시작
      </button>`;
  }
  if (order.status === 'delivery') {
    return `
      <button onclick="advanceOrder('${order.id}', 'completed')" class="w-full py-3 bg-on-surface text-white font-bold rounded-xl active:scale-95 transition-transform flex items-center justify-center gap-2 hover:opacity-90">
        <span class="material-symbols-outlined text-base">check_circle</span>
        배달 완료 처리
      </button>`;
  }
  return `<div class="py-2 text-center text-sm text-on-surface-variant font-semibold flex items-center justify-center gap-1"><span class="material-symbols-outlined text-base text-primary">verified</span> 주문 완료</div>`;
}

// === ORDER ACTIONS ===
function acceptOrder(id) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.id === id);
  if (idx < 0) return;
  orders[idx].status = 'cooking';
  orders[idx].timeLabel = '방금 전';
  saveOrders(orders);
  showToast(`${orders[idx].customer} 고객님 주문 접수 완료!`);
  renderTabs();
  renderOrderCards();
  updateStats();
}

function rejectOrder(id) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.id === id);
  if (idx < 0) return;
  const name = orders[idx].customer;
  orders.splice(idx, 1);
  saveOrders(orders);
  showToast(`${name} 고객님의 주문을 거절했습니다.`, 'warn');
  renderTabs();
  renderOrderCards();
  updateStats();
}

function advanceOrder(id, newStatus) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.id === id);
  if (idx < 0) return;
  orders[idx].status = newStatus;
  orders[idx].timeLabel = '방금 전';
  saveOrders(orders);
  const msgs = { delivery: '배달을 시작합니다!', completed: '배달 완료 처리되었습니다.' };
  showToast(`${orders[idx].customer} 고객님: ${msgs[newStatus] || '상태 변경'}`);
  renderTabs();
  renderOrderCards();
  updateStats();
}

// === DELIVERY TIME ===
function setDeliveryTime(time) {
  localStorage.setItem('jw_delivery_time', time);
  document.querySelectorAll('.time-btn').forEach(btn => {
    if (btn.dataset.time === time) {
      btn.className = 'time-btn flex-none px-4 py-2.5 bg-primary text-white font-bold rounded-lg shadow-inner ring-2 ring-white/30 border-2 border-transparent';
    } else {
      btn.className = 'time-btn flex-none px-4 py-2.5 bg-white text-primary font-bold rounded-lg shadow-sm border-2 border-transparent hover:border-primary transition-all';
    }
  });
  showToast(`예상 시간이 ${time}으로 설정되었습니다.`);
}

function loadDeliveryTime() {
  const saved = localStorage.getItem('jw_delivery_time') || '30-40분';
  document.querySelectorAll('.time-btn').forEach(btn => {
    if (btn.dataset.time === saved) {
      btn.className = 'time-btn flex-none px-4 py-2.5 bg-primary text-white font-bold rounded-lg shadow-inner ring-2 ring-white/30 border-2 border-transparent';
    } else {
      btn.className = 'time-btn flex-none px-4 py-2.5 bg-white text-primary font-bold rounded-lg shadow-sm border-2 border-transparent hover:border-primary transition-all';
    }
  });
}

// === STATS ===
function updateStats() {
  const orders = getOrders();
  const total = orders.reduce((sum, o) => sum + (o.total || 0), 0);
  const count = orders.length;

  const totalEl = document.getElementById('stat-total');
  const countEl = document.getElementById('stat-count');
  if (totalEl) totalEl.textContent = `₩${total.toLocaleString()}`;
  if (countEl) countEl.textContent = count;

  // Menu analytics
  const itemCounts = { '프라이드 치킨': 0, '반반 치킨': 0, '양념 치킨': 0 };
  orders.forEach(o => {
    (o.items || []).forEach(item => {
      if (item.name in itemCounts) itemCounts[item.name] += item.qty;
    });
  });
  const total3 = Object.values(itemCounts).reduce((a, b) => a + b, 0) || 1;
  const names = ['프라이드 치킨', '반반 치킨', '양념 치킨'];
  names.forEach((name, i) => {
    const pct = Math.round((itemCounts[name] / total3) * 100);
    const pctEl = document.getElementById(`pct-${i + 1}`);
    const barEl = document.getElementById(`bar-${i + 1}`);
    if (pctEl) pctEl.textContent = `${pct}%`;
    if (barEl) barEl.style.width = `${pct}%`;
  });
}

// === TOAST ===
let toastTimer;
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  const msgEl = document.getElementById('toast-msg');
  if (!toast || !msgEl) return;
  msgEl.textContent = msg;
  const colors = { success: '#1b1c1c', error: '#ba1a1a', warn: '#77574d' };
  toast.style.background = colors[type] || colors.success;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(1rem)';
  }, 2500);
}

// === SOUND NOTIFICATION ===
let prevNewCount = 0;

function playOrderSound() {
  // 차임 소리 (Web Audio API)
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const start = ctx.currentTime + i * 0.18;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.35, start + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.5);
    osc.start(start);
    osc.stop(start + 0.5);
  });

  // 음 재생 후 음성 안내
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance('주문이 들어왔어요');
    utter.lang = 'ko-KR';
    utter.rate = 0.95;
    utter.pitch = 1.1;
    speechSynthesis.speak(utter);
  }, notes.length * 180 + 100);
}

function checkNewOrders() {
  const orders = getOrders();
  const newCount = orders.filter(o => o.status === 'new').length;
  if (newCount > prevNewCount) {
    playOrderSound();
  }
  prevNewCount = newCount;
}

// === INIT ===
loadDeliveryTime();
renderTabs();
renderOrderCards();
updateStats();
prevNewCount = getOrders().filter(o => o.status === 'new').length;

// Poll for new orders every 10 seconds
setInterval(() => {
  checkNewOrders();
  renderTabs();
  renderOrderCards();
  updateStats();
}, 10000);
</script>
